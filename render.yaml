services:
  - type: web
    name: sign-language-detector
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 1 --timeout 120 --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: GLOG_minloglevel
        value: "2"
      - key: TF_CPP_MIN_LOG_LEVEL
        value: "3"
