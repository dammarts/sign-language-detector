<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso denegado — Sign.Detect</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <style>
    .error-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 70vh;
      gap: 16px;
      text-align: center;
    }
    .error-code {
      font-size: 6rem;
      font-weight: 700;
      color: #ff4466;
      line-height: 1;
      font-family: 'Fira Code', monospace;
    }
    .error-msg {
      font-size: 1.1rem;
      color: #8b91a8;
    }
    .error-hint {
      font-size: 0.85rem;
      color: #555a7a;
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">
      <div class="logo-mark">🤟</div>
      <div class="logo-copy">
        <div class="logo-title">Sign.Detect</div>
        <div class="logo-sub">Acceso restringido</div>
      </div>
    </div>
    <div class="header-right">
      <a href="/" class="nav-link">← Inicio</a>
    </div>
  </header>

  <main>
    <div class="error-wrap">
      <div class="error-code">403</div>
      <div class="error-msg">No tienes permiso para acceder a esta página.</div>
      <div class="error-hint">Esta sección está restringida a usuarios autorizados.</div>
      <a href="/" class="lrn-btn" style="margin-top:12px;padding:10px 28px;text-decoration:none">Volver al inicio</a>
    </div>
  </main>

  <footer>
    <span>SIGN.DETECT v2.0</span>
  </footer>
</body>
</html>
